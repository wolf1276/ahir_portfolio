name: Build & Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-resume:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile LaTeX Resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Ahir_Sarkar_Resume.tex
          working_directory: resume/
          compiler: latexmk
          args: -pdf -interaction=nonstopmode

      - name: Move PDF to Root
        run: mv resume/Ahir_Sarkar_Resume.pdf ./Ahir_Sarkar_Resume.pdf

      - name: Commit & Push PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Ahir_Sarkar_Resume.pdf
          git diff --staged --quiet || (git commit -m "chore: update compiled resume [skip ci]" && git push)

  deploy-pages:
    needs: build-resume
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
