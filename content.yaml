    description: >
      Designed a secure drone communication and validation protocol using
      zero-knowledge principles to ensure data integrity, authenticity,
      and tamper-proof coordination between multiple drones.

      This system enables verification of transmitted data without exposing
      sensitive information, inspired by blockchain trustless models.
    url: ADD_GITHUB_LINK
    image: "/images/zk-drone.png"
    status: "In Progress"
    progress: 85
    tags: [Blockchain, Zero Knowledge, Security, Distributed Systems]

  - name: Autonomous Dual Drone System
    description: >
      Multi-agent drone system where one drone detects infected crops
