      Includes on-device transaction verification and planned support
      for networks like Stellar.
    url: ADD_GITHUB_LINK
    image: "/images/wallet.png"
    status: "Building"
    progress: 40
    tags:
      [Embedded Systems, Security, Blockchain, Cryptography, Hardware Wallet]

